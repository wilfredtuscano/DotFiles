# ============================================================================
# TMUX CONFIGURATION
# ============================================================================
# Portable XDG-compliant tmux configuration
# 
# Features:
# - Auto-installs TPM (Tmux Plugin Manager) if missing
# - XDG Base Directory compliant (~/.config/tmux/)
# - Custom status bar with system info (battery, network, time)
# - Vi-style copy mode with rectangle selection
# - Multiple navigation methods (Alt+arrows, Shift+arrows, Ctrl+hjkl)
# - Intuitive pane splitting (| and -)
# 
# Usage:
# 1. Copy this file to ~/.config/tmux/tmux.conf
# 2. Start tmux - TPM will auto-install if needed
# 3. Press Ctrl-a + I to install plugins
# ============================================================================

# ============================================================================
# TERMINAL & DISPLAY SETTINGS
# ============================================================================
set-option -sa terminal-overrides ",*:Tc"

# ============================================================================
# PREFIX KEY CONFIGURATION
# ============================================================================
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ============================================================================
# BASIC OPTIONS
# ============================================================================
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# ============================================================================
# STATUS BAR CONFIGURATION
# ============================================================================
set -g status-position top
set -g status-justify "absolute-centre"

# Status bar lengths
set -g status-left-length 100
set -g status-right-length 100

# Status left content
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# Status right content
set -g status-right ""
set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=#{@thm_bg},fg=#{@thm_pink}]}} #{battery_icon} #{battery_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_bg}]#{?#{==:#{online_status},ok},#[fg=#{@thm_mauve}] 󰖩 on ,#[fg=#{@thm_red},bold]#[reverse] 󰖪 off }"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# Window status styling
set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

# ============================================================================
# KEY BINDINGS
# ============================================================================

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Pane navigation (no prefix required)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Window navigation (no prefix required)
bind -n S-Left previous-window
bind -n S-Right next-window

# Pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ============================================================================
# VI MODE & COPY SETTINGS
# ============================================================================
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ============================================================================
# PLUGINS
# ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'

# ============================================================================
# PLUGIN SETTINGS
# ============================================================================

# Catppuccin theme settings
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Online status icons
set -g @online_icon "ok"
set -g @offline_icon "nok"

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# ============================================================================
# INITIALIZE PLUGIN MANAGER
# ============================================================================

# Bootstrap TPM if not installed (XDG compliant)
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'

