# ============================================================================
# TMUX CONFIGURATION
# ============================================================================
# Portable XDG-compliant tmux configuration
#
# Features:
# - Auto-installs TPM (Tmux Plugin Manager) if missing
# - XDG Base Directory compliant (~/.config/tmux/)
# - Catppuccin themed status bar with CPU, RAM, battery, online status, and date/time
# - Vi-style copy mode with rectangle selection
# - Pane navigation (Alt+arrows), window navigation (Shift+arrows)
# - Vim-tmux-navigator for seamless Ctrl+hjkl pane switching
# - Intuitive pane splitting (| and -)
#
# Usage:
# 1. Copy this file to ~/.config/tmux/tmux.conf
# 2. Start tmux - TPM will auto-install if needed
# 3. Press Ctrl-a + I to install plugins
# ============================================================================

# ============================================================================
# TERMINAL & DISPLAY SETTINGS
# ============================================================================
set-option -sa terminal-overrides ",xterm*:Tc"

# ============================================================================
# PREFIX KEY CONFIGURATION
# ============================================================================
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ============================================================================
# BASIC OPTIONS
# ============================================================================
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# ============================================================================
# KEY BINDINGS
# ============================================================================

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Pane navigation (no prefix required)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Window navigation (no prefix required)
bind -n S-Left previous-window
bind -n S-Right next-window

# Pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ============================================================================
# VI MODE & COPY SETTINGS
# ============================================================================
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ============================================================================
# PLUGINS
# ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# ============================================================================
# PLUGIN SETTINGS
# ============================================================================

# Catppuccin theme
set -g @catppuccin_status_background "#{@thm_bg}"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #{pane_current_command}"
set -g @catppuccin_window_current_text " #{pane_current_command}"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"
set -g @catppuccin_date_time_text " %Y-%m-%d 󰅐 %I:%M %p"
set -g @catppuccin_session_icon " 󰆍 "
set -g @catppuccin_status_module_text_bg "#{E:@thm_bg}"

# tmux-cpu: consistent colors for CPU and RAM pills
set -g @cpu_low_bg_color "#{E:@thm_bg}"
set -g @cpu_medium_bg_color "#{E:@thm_bg}"
set -g @cpu_high_bg_color "#{E:@thm_bg}"
set -g @cpu_low_fg_color "#{E:@thm_fg}"
set -g @cpu_medium_fg_color "#{E:@thm_fg}"
set -g @cpu_high_fg_color "#{E:@thm_fg}"
set -g @ram_low_bg_color "#{E:@thm_bg}"
set -g @ram_medium_bg_color "#{E:@thm_bg}"
set -g @ram_high_bg_color "#{E:@thm_bg}"
set -g @ram_low_fg_color "#{E:@thm_fg}"
set -g @ram_medium_fg_color "#{E:@thm_fg}"
set -g @ram_high_fg_color "#{E:@thm_fg}"

# Online status icons
set -g @online_icon "ok"
set -g @offline_icon "nok"

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# ============================================================================
# STATUS BAR
# ============================================================================

# Source Catppuccin plugin to enable module system
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

# Custom RAM module (Catppuccin has no built-in memory module)
set -g @catppuccin_ctp_memory_text " #{l:#{ram_percentage}}"
set -gF @catppuccin_status_ctp_memory "#[fg=#{E:@thm_green}]#{@catppuccin_status_left_separator}#[fg=#{E:@thm_crust},bg=#{E:@thm_green}]󰘚 #[fg=#{E:@thm_fg},bg=#{E:@thm_bg}]"
set -ag @catppuccin_status_ctp_memory "#{E:@catppuccin_ctp_memory_text}"
set -agF @catppuccin_status_ctp_memory "#[fg=#{E:@thm_bg}] "

set -g status-position top
set -g status-justify "left"
set -g status-left-length 200
set -g status-right-length 150

# Left: session pill → window tabs
set -g status-left "#{E:@catppuccin_status_session} "

# Right: CPU → RAM → battery → online → date/time
set -gF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ctp_memory}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#[fg=#{@thm_mauve},bg=#{@thm_bg}]#[fg=#{@thm_crust},bg=#{@thm_mauve}]#{?#{==:#{online_status},ok},󰖩 ,󰖪 }#[fg=#{@thm_mauve},bg=#{@thm_bg}] "
set -ag status-right "#{E:@catppuccin_status_date_time}"

# ============================================================================
# INITIALIZE PLUGIN MANAGER
# ============================================================================

# Bootstrap TPM if not installed (XDG compliant)
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
